name: Quick Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL'
        required: true
      type:
        description: 'Type'
        required: true
        type: choice
        options:
          - Webpage
          - Screenshot
          - Clone Full Site
        default: 'Webpage'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Webpage
        if: ${{ github.event.inputs.type == 'Webpage' }}
        run: |
          curl -L -o result.html "${{ github.event.inputs.url }}"
          echo "Page saved: $(wc -c < result.html) bytes"

      - name: Screenshot
        if: ${{ github.event.inputs.type == 'Screenshot' }}
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q chromium-browser
          pip install selenium -q
          python3 -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          opts = Options()
          opts.add_argument('--headless')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')
          driver = webdriver.Chrome(options=opts)
          driver.get('${{ github.event.inputs.url }}')
          driver.save_screenshot('screenshot.png')
          driver.quit()
          "

      - name: Clone
        if: ${{ github.event.inputs.type == 'Clone Full Site' }}
        run: |
          url="${{ github.event.inputs.url }}"
          name=$(echo "$url" | sed 's|https\?://||' | cut -d'/' -f1)
          mkdir -p "$name"
          cd "$name"
          wget -r -l1 -p -k -np --timeout=15 --tries=2 "$url" 2>&1 | tail -5
          cd ..
          zip -r "${name}.zip" "$name"

      - name: Save
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add -f result.html screenshot.png *.zip 2>/dev/null
          git commit -m "Downloaded" || echo "Nothing to commit"
          git push || echo "Push failed — download from Actions tab"
