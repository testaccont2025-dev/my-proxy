name: Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://fa.wikipedia.org'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Take Full Page Screenshot
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q chromium-browser
          pip install selenium -q
          
          python3 << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          import base64, time

          url = "${{ github.event.inputs.url }}"
          
          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--window-size=1920,1080")
          
          print(f"📸 Opening: {url}")
          
          driver = webdriver.Chrome(options=options)
          driver.get(url)
          
          # ۳ ثانیه صبر برای لود کامل
          print("⏳ Waiting 3 seconds...")
          time.sleep(3)
          
          # گرفتن ارتفاع کل صفحه
          total_height = driver.execute_script("return document.body.scrollHeight")
          print(f"📏 Page height: {total_height}px")
          
          # تنظیم پنجره به اندازه کل صفحه
          driver.set_window_size(1920, total_height)
          time.sleep(1)
          
          # اسکرین‌شات
          print("📸 Capturing...")
          screenshot = driver.get_screenshot_as_base64()
          driver.quit()
          
          print(f"✅ Size: {len(screenshot)} chars")
          print("=" * 60)
          print("📷 COPY FROM BELOW:")
          print(screenshot)
          print("📷 COPY ABOVE THIS LINE")
          print("=" * 60)
          print("Paste in browser: data:image/png;base64,PASTE_HERE")
          EOF
